name: Deploy RAG to ECS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # One image built per commit, tagged with both the git SHA (immutable,
      # for audit + rollback) and :latest (what the task definition points at).
      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}
        run: |
          docker build -t "$REGISTRY:${{ github.sha }}" -t "$REGISTRY:latest" .
          docker push "$REGISTRY:${{ github.sha }}"
          docker push "$REGISTRY:latest"

      # Force a rolling deployment. On Fargate this always re-pulls :latest,
      # so the new image goes live.
      - name: Trigger ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment

      # update-service returns immediately; this blocks until the new task is
      # running and healthy (or fails), so a green run means the change is live.
      - name: Wait for the deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }}
